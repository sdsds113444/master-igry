<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/koya-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#EF3124" />
    <!-- Тема ставится до рендера отдельным файлом (не inline) — чтобы CSP запрещал inline-скрипты. -->

    <!-- Шрифты (self-hosted, @font-face в src/index.css). Предзагружаем оба

    <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/rubik-var.woff2" as="font" type="font/woff2" crossorigin />

  </head>

    <script type="module" src="/src/main.tsx"></script>
